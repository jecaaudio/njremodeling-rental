<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Property Details | NJ Remodeling and Rental</title>
    <meta
      name="description"
      content="View rental property photos, details, and contact options from NJ Remodeling and Rental."
    />
    <link rel="canonical" href="https://jecaaudio.github.io/njremodeling-rental/property.html" />
    <meta property="og:type" content="website" />
    <meta property="og:title" content="Property Details | NJ Remodeling and Rental" />
    <meta
      property="og:description"
      content="View rental property photos, details, and contact options from NJ Remodeling and Rental."
    />
    <meta property="og:image" content="https://jecaaudio.github.io/njremodeling-rental/assets/property-hero.jpg" />
    <meta property="og:url" content="https://jecaaudio.github.io/njremodeling-rental/property.html" />
    <meta name="twitter:card" content="summary_large_image" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
    <link rel="icon" type="image/png" href="assets/favicon.png" />
    <link rel="apple-touch-icon" href="assets/favicon.png" />
    <link rel="stylesheet" href="styles.css" />
    <script src="properties-data.js"></script>
  </head>
  <body>
    <header class="site-header">
      <a class="brand" href="index.html" aria-label="NJ Remodeling and Rental home">
        <span class="brand-mark">
          <img src="assets/favicon.png" alt="" />
        </span>
        <span>
          <strong>NJ Remodeling and Rental</strong>
          <small>Jansel E. Cutino &middot; Louisville, KY</small>
        </span>
      </a>
      <nav class="nav-links" aria-label="Primary navigation">
        <a href="index.html" data-i18n="navHome">Home</a>
        <a href="rentals.html" data-i18n="navRentals">Rentals</a>
        <a href="index.html#services" data-i18n="navServices">Services</a>
        <a href="index.html#contact" data-i18n="navContact">Contact</a>
      </nav>
      <div class="header-actions">
        <div class="language-switch" aria-label="Language selector">
          <button type="button" class="language-option is-active" data-lang-choice="en">EN</button>
          <button type="button" class="language-option" data-lang-choice="es">ES</button>
        </div>
        <a class="header-cta" href="tel:+15025540333">502-554-0333</a>
      </div>
    </header>

    <main class="property-detail-page">
      <section class="property-detail-shell" id="property-detail"></section>
    </main>

    <footer class="site-footer">
      <p>&copy; 2026 NJ Remodeling and Rental. Louisville, KY.</p>
      <div>
        <a href="tel:+15025540333">502-554-0333</a>
        <a href="mailto:njremodelingrental@gmail.com">njremodelingrental@gmail.com</a>
        <a href="https://www.facebook.com/people/NJ-Remodeling-and-Rental/61574809101327/" target="_blank" rel="noopener noreferrer">Facebook</a>
        <a href="https://www.tiktok.com/@nj.remodeling.and.rental?is_from_webapp=1&amp;sender_device=pc" target="_blank" rel="noopener noreferrer">TikTok</a>
      </div>
    </footer>

    <script>
      const propertyTranslations = {
        en: {
          navHome: "Home",
          navRentals: "Rentals",
          navServices: "Services",
          navContact: "Contact",
          backToRentals: "Back to rentals",
          detailEyebrow: "Property details",
          bedroomUnit: "BR",
          bathroomUnit: "BA",
          sqftUnit: "sqft",
          overviewTitle: "About this property",
          factsTitle: "Home details",
          addressLabel: "Address",
          cityStateLabel: "City and state",
          bedroomsLabel: "Bedrooms",
          bathroomsLabel: "Bathrooms",
          sqftLabel: "Square feet",
          photosTitle: "Photos",
          sourceNote: "Photos are shown from site files or public listing sources when available.",
          viewZillow: "Open Zillow link",
          askAbout: "Ask about this rental",
          photoAlt: "Property photo",
          notFoundTitle: "Property not found.",
          notFoundCopy: "Return to the rentals page and choose a property from the list."
        },
        es: {
          navHome: "Inicio",
          navRentals: "Rentas",
          navServices: "Servicios",
          navContact: "Contacto",
          backToRentals: "Volver a rentas",
          detailEyebrow: "Detalles de la propiedad",
          bedroomUnit: "hab.",
          bathroomUnit: "baños",
          sqftUnit: "pies²",
          overviewTitle: "Sobre esta propiedad",
          factsTitle: "Detalles de la casa",
          addressLabel: "Dirección",
          cityStateLabel: "Ciudad y estado",
          bedroomsLabel: "Habitaciones",
          bathroomsLabel: "Baños",
          sqftLabel: "Pies cuadrados",
          photosTitle: "Fotos",
          sourceNote: "Las fotos se muestran desde archivos del sitio o fuentes públicas cuando están disponibles.",
          viewZillow: "Abrir enlace de Zillow",
          askAbout: "Preguntar por esta renta",
          photoAlt: "Foto de la propiedad",
          notFoundTitle: "Propiedad no encontrada.",
          notFoundCopy: "Regresa a la página de rentas y escoge una propiedad de la lista."
        }
      };

      const properties = window.NJProperties.load(window.NJProperties.defaultProperties);

      const detailRoot = document.querySelector("#property-detail");
      const languageButtons = document.querySelectorAll("[data-lang-choice]");
      const storage = {
        get(key) {
          try {
            return localStorage.getItem(key);
          } catch {
            return null;
          }
        },
        set(key, value) {
          try {
            localStorage.setItem(key, value);
          } catch {
            return;
          }
        }
      };
      let currentLanguage = storage.get("nj-language") || "en";
      let activePhotoIndex = 0;

      function getProperty() {
        const id = new URLSearchParams(window.location.search).get("id");
        return properties.find((property) => property.id === id);
      }

      function escapeAttribute(value) {
        return String(value).replaceAll("&", "&amp;").replaceAll('"', "&quot;");
      }

      function renderDetail() {
        const dictionary = propertyTranslations[currentLanguage] || propertyTranslations.en;
        const property = getProperty();

        if (!property) {
          detailRoot.innerHTML = `
            <div class="property-empty-detail">
              <a class="button neutral" href="rentals.html">${dictionary.backToRentals}</a>
              <h1>${dictionary.notFoundTitle}</h1>
              <p>${dictionary.notFoundCopy}</p>
            </div>
          `;
          return;
        }

        const photos = property.photos && property.photos.length ? property.photos : [property.fallbackImage];
        if (activePhotoIndex >= photos.length) activePhotoIndex = 0;
        const activePhoto = escapeAttribute(photos[activePhotoIndex]);
        const fallback = escapeAttribute(property.fallbackImage || "assets/property-hero.jpg");
        const description = property.description[currentLanguage] || property.description.en;
        const stats = `${property.bedrooms ?? 0} ${dictionary.bedroomUnit} &middot; ${property.bathrooms ?? 0} ${dictionary.bathroomUnit} &middot; ${Number(property.sqft || 0).toLocaleString()} ${dictionary.sqftUnit}`;
        const zillowLink = property.zillowUrl
          ? `<a class="button neutral" href="${escapeAttribute(property.zillowUrl)}" target="_blank" rel="noopener noreferrer">${dictionary.viewZillow}</a>`
          : "";

        detailRoot.innerHTML = `
          <a class="button neutral detail-back" href="rentals.html">${dictionary.backToRentals}</a>
          <div class="property-detail-layout">
            <section class="property-detail-gallery" aria-label="${dictionary.photosTitle}">
              <img class="property-detail-main-photo" src="${activePhoto}" alt="${dictionary.photoAlt} ${activePhotoIndex + 1}" onerror="this.onerror=null;this.src='${fallback}'" />
              <div class="property-detail-thumbs">
                ${photos
                  .map(
                    (photo, index) => `
                      <button class="${index === activePhotoIndex ? "is-active" : ""}" type="button" data-photo-index="${index}" aria-label="${dictionary.photoAlt} ${index + 1}">
                        <img src="${escapeAttribute(photo)}" alt="${dictionary.photoAlt} ${index + 1}" onerror="this.closest('button').remove()" />
                      </button>
                    `
                  )
                  .join("")}
              </div>
              <p>${dictionary.sourceNote}</p>
            </section>
            <section class="property-detail-info">
              <p class="eyebrow">${dictionary.detailEyebrow}</p>
              <h1>${property.title}</h1>
              <p class="property-detail-stats">${stats}</p>
              <h2>${dictionary.overviewTitle}</h2>
              <p>${description}</p>
              <div class="property-facts">
                <h2>${dictionary.factsTitle}</h2>
                <dl>
                  <div><dt>${dictionary.addressLabel}</dt><dd>${property.address}</dd></div>
                  <div><dt>${dictionary.cityStateLabel}</dt><dd>${property.city}, ${property.state} ${property.zip}</dd></div>
                  <div><dt>${dictionary.bedroomsLabel}</dt><dd>${property.bedrooms ?? 0}</dd></div>
                  <div><dt>${dictionary.bathroomsLabel}</dt><dd>${property.bathrooms ?? 0}</dd></div>
                  <div><dt>${dictionary.sqftLabel}</dt><dd>${Number(property.sqft || 0).toLocaleString()}</dd></div>
                </dl>
              </div>
              <div class="property-detail-actions">
                <a class="button primary" href="mailto:njremodelingrental@gmail.com?subject=${encodeURIComponent(dictionary.askAbout + " " + property.title)}">${dictionary.askAbout}</a>
                ${zillowLink}
              </div>
            </section>
          </div>
        `;

        detailRoot.querySelectorAll("[data-photo-index]").forEach((button) => {
          button.addEventListener("click", () => {
            activePhotoIndex = Number(button.getAttribute("data-photo-index"));
            renderDetail();
          });
        });
      }

      function applyLanguage(language) {
        const activeLanguage = propertyTranslations[language] ? language : "en";
        const dictionary = propertyTranslations[activeLanguage];
        currentLanguage = activeLanguage;
        document.documentElement.lang = activeLanguage;

        document.querySelectorAll("[data-i18n]").forEach((element) => {
          const key = element.getAttribute("data-i18n");
          if (dictionary[key]) element.textContent = dictionary[key];
        });

        languageButtons.forEach((button) => {
          const isActive = button.getAttribute("data-lang-choice") === activeLanguage;
          button.classList.toggle("is-active", isActive);
          button.setAttribute("aria-pressed", String(isActive));
        });

        storage.set("nj-language", activeLanguage);
        renderDetail();
      }

      languageButtons.forEach((button) => {
        button.addEventListener("click", () => applyLanguage(button.getAttribute("data-lang-choice")));
      });

      applyLanguage(currentLanguage);
    </script>
  </body>
</html>
